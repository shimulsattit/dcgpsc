# Virtual Host configuration for Hajee project
# Created: 2026-01-01

<VirtualHost *:80>
    DocumentRoot "c:/laragon/www/Hajee/public"
    ServerName hajee.test
    ServerAlias *.hajee.test
    
    <Directory "c:/laragon/www/Hajee/public">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>
    
    ErrorLog "c:/laragon/www/Hajee/storage/logs/apache-error.log"
    CustomLog "c:/laragon/www/Hajee/storage/logs/apache-access.log" combined
</VirtualHost>
